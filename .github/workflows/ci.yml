# .github/workflows/ci.yml
# Pipeline CI/CD : Lint HTML/CSS + Déploiement GitHub Pages

name: CI/CD – Lint & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : LINT HTML
  # ─────────────────────────────────────────
  lint-html:
    name: 🔍 Lint HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer html-validate
        run: npm install -g html-validate

      - name: Lancer le lint HTML
        run: html-validate index.html events.html contact.html

  # ─────────────────────────────────────────
  # JOB 2 : LINT CSS
  # ─────────────────────────────────────────
  lint-css:
    name: 🎨 Lint CSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Lancer le lint CSS
        run: stylelint "css/**/*.css"

  # ─────────────────────────────────────────
  # JOB 3 : VALIDATION JS
  # ─────────────────────────────────────────
  validate-js:
    name: ✅ Validation JavaScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer ESLint
        run: npm install -g eslint

      - name: Lancer ESLint
        run: eslint "js/**/*.js"