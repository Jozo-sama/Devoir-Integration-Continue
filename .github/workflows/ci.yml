# .github/workflows/ci-cd.yml
# Pipeline CI/CD : Lint HTML/CSS + Déploiement GitHub Pages

name: CI/CD – Lint & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : LINT HTML
  # ─────────────────────────────────────────
  lint-html:
    name: 🔍 Lint HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer html-validate
        run: npm install -g html-validate

      - name: Lancer le lint HTML
        run: html-validate index.html events.html contact.html

  # ─────────────────────────────────────────
  # JOB 2 : LINT CSS
  # ─────────────────────────────────────────
  lint-css:
    name: 🎨 Lint CSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Lancer le lint CSS
        run: stylelint "css/**/*.css"

  # ─────────────────────────────────────────
  # JOB 3 : VALIDATION JS
  # ─────────────────────────────────────────
  validate-js:
    name: ✅ Validation JavaScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer ESLint
        run: npm install -g eslint

      - name: Lancer ESLint
        run: eslint "js/**/*.js" --env browser --env es2020 --rule "no-undef: off"

  # ─────────────────────────────────────────
  # JOB 4 : DÉPLOIEMENT (seulement sur main)
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Déploiement GitHub Pages
    runs-on: ubuntu-latest
    needs: [ lint-html, lint-css, validate-js ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload des fichiers statiques
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Déployer sur GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
