# .github/workflows/ci.yml
# Pipeline CI/CD : Lint HTML/CSS + Déploiement GitHub Pages

name: CI/CD – Lint & Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : LINT HTML
  # ─────────────────────────────────────────
  lint-html:
    name: 🔍 Lint HTML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer html-validate
        run: npm install -g html-validate

      - name: Lancer le lint HTML
        run: html-validate index.html events.html contact.html

  # ─────────────────────────────────────────
  # JOB 2 : LINT CSS
  # ─────────────────────────────────────────
  lint-css:
    name: 🎨 Lint CSS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer stylelint
        run: npm install -g stylelint stylelint-config-standard

      - name: Lancer le lint CSS
        run: stylelint "css/**/*.css"

  # ─────────────────────────────────────────
  # JOB 3 : VALIDATION JS
  # ─────────────────────────────────────────
  validate-js:
    name: ✅ Validation JavaScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Installer ESLint
        run: npm install -g eslint

      - name: Lancer ESLint
        run: eslint "js/**/*.js"

# ─────────────────────────────────────────
  # JOB 4 : DÉPLOIEMENT GITHUB PAGES
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Déploiement GitHub Pages
    runs-on: ubuntu-latest
    needs: [lint-html, lint-css, validate-js]  # attend que les 3 jobs passent
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      - name: Déployer sur GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./          # racine du projet = dossier à déployer
          publish_branch: gh-pages